  <script>/*! coi-serviceworker v0.1.7 - Guido Zuidhof and contributors, licensed under MIT */
let coepCredentialless = false;
if (typeof window === 'undefined') {
    self.addEventListener("install", () => self.skipWaiting());
    self.addEventListener("activate", (event) => event.waitUntil(self.clients.claim()));

    self.addEventListener("message", (ev) => {
        if (!ev.data) {
            return;
        } else if (ev.data.type === "deregister") {
            self.registration
                .unregister()
                .then(() => {
                    return self.clients.matchAll();
                })
                .then(clients => {
                    clients.forEach((client) => client.navigate(client.url));
                });
        } else if (ev.data.type === "coepCredentialless") {
            coepCredentialless = ev.data.value;
        }
    });

    self.addEventListener("fetch", function (event) {
        const r = event.request;
        if (r.cache === "only-if-cached" && r.mode !== "same-origin") {
            return;
        }

        const request = (coepCredentialless && r.mode === "no-cors")
            ? new Request(r, {
                credentials: "omit",
            })
            : r;
        event.respondWith(
            fetch(request)
                .then((response) => {
                    if (response.status === 0) {
                        return response;
                    }

                    const newHeaders = new Headers(response.headers);
                    newHeaders.set("Cross-Origin-Embedder-Policy",
                        coepCredentialless ? "credentialless" : "require-corp"
                    );
                    if (!coepCredentialless) {
                        newHeaders.set("Cross-Origin-Resource-Policy", "cross-origin");
                    }
                    newHeaders.set("Cross-Origin-Opener-Policy", "same-origin");

                    return new Response(response.body, {
                        status: response.status,
                        statusText: response.statusText,
                        headers: newHeaders,
                    });
                })
                .catch((e) => console.error(e))
        );
    });

    (() => {
        // You can customize the behavior of this script through a global `coi` variable.
        const coi = {
            shouldRegister: () => true,
            shouldDeregister: () => false,
            coepCredentialless: () => !(window.chrome || window.netscape),
            doReload: () => window.location.reload(),
            quiet: false,
            ...window.coi
        };

        const n = navigator;

        if (n.serviceWorker && n.serviceWorker.controller) {
            n.serviceWorker.controller.postMessage({
                type: "coepCredentialless",
                value: coi.coepCredentialless(),
            });

            if (coi.shouldDeregister()) {
                n.serviceWorker.controller.postMessage({ type: "deregister" });
            }
        }

        // If we're already coi: do nothing. Perhaps it's due to this script doing its job, or COOP/COEP are
        // already set from the origin server. Also if the browser has no notion of crossOriginIsolated, just give up here.
        if (window.crossOriginIsolated !== false || !coi.shouldRegister()) return;

        if (!window.isSecureContext) {
            !coi.quiet && console.log("COOP/COEP Service Worker not registered, a secure context is required.");
            return;
        }

        // In some environments (e.g. Chrome incognito mode) this won't be available
        if (n.serviceWorker) {
            n.serviceWorker.register(new URL('./coi-serviceworker.js', document.baseURI).href).then(
                (registration) => {
                    !coi.quiet && console.log("COOP/COEP Service Worker registered", registration.scope);

                    registration.addEventListener("updatefound", () => {
                        !coi.quiet && console.log("Reloading page to make use of updated COOP/COEP Service Worker.");
                        coi.doReload();
                    });

                    // If the registration is active, but it's not controlling the page
                    if (registration.active && !n.serviceWorker.controller) {
                        !coi.quiet && console.log("Reloading page to make use of COOP/COEP Service Worker.");
                        coi.doReload();
                    }
                },
                (err) => {
                    !coi.quiet && console.error("COOP/COEP Service Worker failed to register:", err);

            );

  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    :root {
      --background-color--dark: #1e1e1e;
      --text-color--dark: #ffa500;
      --background-color--light: #f5f5f5;
      --text-color--light: #1e1e1e;
    }

    @media (prefers-reduced-motion: no-preference) {
      html.animation {
        transition-duration: 150ms;
        transition-property: background-color, border-radius, border-color, color;
        transition-timing-function: ease-in-out;
      }
    }

    html.dark {
      --background-color: var(--background-color--dark, #1e1e1e);
      --text-color: var(--text-color--dark, #ffa500);
      --scrollbar-thumb-color: var(--text-color);
      --scrollbar-thumb-hover: var(--text-color);

      background-color: var(--background-color);
      color: var(--text-color);
    }

    html.light {
      --background-color: var(--background-color--light, #1e1e1e);
      --text-color: var(--text-color--light, #1e1e1e);
      --scrollbar-thumb-color: var(--text-color);
      --scrollbar-thumb-hover: var(--text-color);

      background-color: var(--background-color);
      color: var(--text-color);
    }

    @media (prefers-color-scheme: dark) {
      html:not(.light):not(.dark) {
        --background-color: var(--background-color--dark, #1e1e1e);
        --text-color: var(--text-color--dark, #ffa500);
        --scrollbar-thumb-color: var(--text-color);
        --scrollbar-thumb-hover: var(--text-color);

        background-color: var(--background-color);
        color: var(--text-color);
      }
    }

    @supports not selector(::-webkit-scrollbar) {
      html {
        scrollbar-width: thin;
        scrollbar-color: var(--scrollbar-thumb-color) transparent;
      }
    }

    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background-color: var(--scrollbar-thumb-color);
      border-radius: 0;
    }

    ::-webkit-scrollbar-thumb:hover {
      background-color: var(--scrollbar-thumb-hover);
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }

    body {
      position: relative;
      background-color: var(--background-color);
      color: var(--text-color);
      font-family: Consolas, "Courier New", Menlo, Monaco, "Liberation Mono", "Lucida Console", monospace;
      font-size: 16px;
      font-kerning: normal;
      font-variant-ligatures: none;

      text-shadow: 0 0 1px rgba(255, 255, 255, 0.1);
      text-wrap: pretty;
      word-break: break-word;
      text-rendering: optimizeLegibility;

      transform: translateZ(0);

      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      -moz-font-smoothing: antialiased;
      font-feature-settings: "kern" 1, "liga" 0;
      -webkit-font-feature-settings: "kern" 1, "liga" 0;
      -moz-font-feature-settings: "kern" 1, "liga" 0;
      font-smooth: always;
    }

    .screen {
      position: absolute;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background-color: inherit;
      transform-origin: center;
    }

    @media (prefers-reduced-motion: no-preference) {
      @keyframes crtTurnOn {
        0% {
          transform: scaleX(0) scaleY(0);
        }

        30% {
          transform: scaleX(.5) scaleY(0.05);
        }

        80% {
          transform: scaleX(.9) scaleY(0.5);
        }

        100% {
          transform: scaleX(1) scaleY(1);
        }
      }

      .screen {
        animation: crtTurnOn 250ms ease-in-out forwards;
        transform: scaleX(0) scaleY(0);
        will-change: clip-path;
      }
    }

    .page {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      opacity: 0.5;
    }

          opacity: 1;
        }
      }

        animation: fadeIn 150ms ease-in-out forwards;
